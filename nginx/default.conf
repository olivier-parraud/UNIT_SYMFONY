# Déclare un bloc de configuration pour un serveur virtuel (Virtual Host)
server {
    # Indique à Nginx d'écouter les requêtes HTTP entrantes sur le port standard 80
    listen 80;
    
    # Définit le nom de domaine auquel ce serveur répond (ici, les requêtes locales)
    server_name localhost;
    
    # Définit le dossier racine du projet. Pour Symfony, il faut pointer vers le dossier /public
    root /var/www/html/public;

    # Définit l'ordre de priorité des fichiers à chercher par défaut si aucun fichier précis n'est demandé
    index index.php index.html;

    # Configuration pour toutes les requêtes qui commencent par la racine "/"
    location / {
        # Cherche d'abord si la ressource demandée existe sous forme de fichier ($uri). 
        # Si elle n'existe pas, Nginx redirige de manière transparente la requête vers le "Front Controller" de Symfony (index.php) en conservant les arguments de l'URL ($is_args$args).
        try_files $uri /index.php$is_args$args;
    }

    # Configuration spécifique pour intercepter et traiter tous les fichiers qui se terminent par ".php"
    location ~ \.php$ {
        # Inclut le fichier de configuration standard de Nginx contenant les paramètres nécessaires à FastCGI
        include fastcgi_params;
        
        # Envoie la requête PHP au conteneur nommé "app" sur le port 9000 (le port par défaut de PHP-FPM configuré dans ton docker-compose)
        fastcgi_pass app:9000;
        
        # Spécifie le fichier PHP par défaut à exécuter dans ce contexte
        fastcgi_index index.php;
        
        # Indique à PHP-FPM le chemin absolu exact du script à exécuter sur le disque (le dossier racine + le nom du script)
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Configuration de sécurité pour intercepter tous les fichiers dont le nom commence par "/.ht" (comme le fichier .htaccess d'Apache)
    location ~ /\.ht {
        # Interdit strictement l'accès à ces fichiers pour éviter les fuites de configuration ou de sécurité
        deny all;
    }
}